<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EIU Clinical Supervision Hub</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">

  <!-- Firebase SDK importmap (no build step required) -->
  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
      "firebase/functions": "https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js"
    }
  }
  </script>
</head>
<body>
  <div id="app">

    <!-- Auth Screen (shown when logged out) -->
    <div id="view-auth"></div>

    <!-- Supervisor Shell -->
    <div id="supervisor-shell" hidden>

      <!-- Top Bar -->
      <header class="top-bar">
        <h1 class="app-title">EIU Clinical Supervision Hub</h1>
        <div class="top-actions">
          <button id="btn-data" class="btn btn-secondary">Data</button>
          <button id="btn-export" class="btn btn-primary">Export Excel</button>
          <button id="btn-export-word" class="btn btn-secondary">Export Word</button>
        </div>
      </header>

      <!-- Archive mode banner (hidden when viewing current semester) -->
      <div id="archive-banner" class="archive-banner" hidden>
        <span id="archive-banner-label"></span>
        <div class="archive-banner-actions">
          <button id="btn-restore-semester" class="btn btn-sm btn-secondary">↩ Restore This Semester</button>
          <button id="btn-exit-archive" class="btn btn-sm btn-secondary">← Current Semester</button>
        </div>
      </div>

      <!-- Module Navigation -->
      <nav class="module-nav">
        <button class="module-tab active" data-module="observations">Observation Notes</button>
        <button class="module-tab" data-module="evaluations">Evaluations</button>
        <button class="module-tab" data-module="soap">SOAP Notes</button>
        <button class="module-tab" data-module="itp">Treatment Plans</button>
        <button class="module-tab" data-module="roster">Roster</button>
      </nav>

      <!-- Clinician Selector Tabs (shared across Observations + Evaluations) -->
      <nav id="clinician-tabs" class="clinician-tabs" hidden></nav>

      <!-- View Toggle (within Observations module only) -->
      <div id="view-tabs" class="view-tabs" hidden>
        <button class="view-tab active" data-view="observer">New Observation</button>
        <button class="view-tab" data-view="history">Session History</button>
        <button class="view-tab" data-view="schedule">Schedule</button>
      </div>

      <!-- Migration banner (shown once after first sign-in if local data exists) -->
      <div id="migration-area" hidden></div>

      <!-- Main Content Area -->
      <main id="main-content">

        <!-- Welcome / empty state -->
        <div id="view-welcome" class="view">
          <div class="empty-state">
            <h2>Welcome to EIU Clinical Supervision Hub</h2>
            <p>Set up your semester and add clinicians to get started.</p>
            <button id="btn-welcome-setup" class="btn btn-primary">Go to Roster Setup</button>
          </div>
        </div>

        <!-- Roster Module View -->
        <div id="view-roster" class="view" hidden></div>

        <!-- Observation Notes Module Views -->
        <div id="view-observer" class="view" hidden></div>
        <div id="view-history" class="view" hidden></div>
        <div id="view-schedule" class="view" hidden></div>

        <!-- Evaluations Module View -->
        <div id="view-evaluations" class="view" hidden></div>

        <!-- SOAP Notes Module View -->
        <div id="view-soap" class="view" hidden></div>

        <!-- ITP Module View -->
        <div id="view-itp" class="view" hidden></div>

        <!-- Data Management View -->
        <div id="view-data" class="view" hidden></div>

      </main>
    </div><!-- /supervisor-shell -->

    <!-- Student Shell -->
    <div id="student-shell" hidden>
      <header class="top-bar" id="student-header"></header>
      <main id="student-content" class="student-main"></main>
    </div>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
